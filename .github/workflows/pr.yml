name: PR checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint backend (ruff)
        run: pip install ruff && ruff check backend/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint frontend (eslint)
        run: cd frontend && npm ci && npm run lint

  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag_user
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: ragdb
        options: >-
          --health-cmd "pg_isready -U rag_user -d ragdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyTorch CPU-only
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://rag_user:testpassword@localhost:5432/ragdb
          OPENROUTER_API_KEY: dummy
        run: pytest tests/ -v

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend

      - name: Build frontend image
        run: docker build ./frontend

  trivy:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend for scan
        run: docker build -t rag-backend:pr ./backend

      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: rag-backend:pr
          severity: CRITICAL,HIGH

  terraform-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.OVH_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OVH_S3_SECRET_KEY }}
          OS_AUTH_URL: ${{ secrets.OS_AUTH_URL }}
          OS_USERNAME: ${{ secrets.OS_USERNAME }}
          OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
          OS_TENANT_ID: ${{ secrets.OS_TENANT_ID }}
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.OVH_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OVH_S3_SECRET_KEY }}
          OS_AUTH_URL: ${{ secrets.OS_AUTH_URL }}
          OS_USERNAME: ${{ secrets.OS_USERNAME }}
          OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
          OS_TENANT_ID: ${{ secrets.OS_TENANT_ID }}
          TF_VAR_ovh_project_id: ${{ secrets.OS_TENANT_ID }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_domain_name: ${{ vars.DOMAIN_NAME }}
          TF_VAR_postgres_password: ${{ secrets.POSTGRES_PASSWORD }}
          TF_VAR_openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
        run: terraform plan -no-color 2>&1 | tee plan.txt

      - name: Comment PR with Terraform plan
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan.txt', 'utf8');
            const body = plan.length > 60000
              ? plan.slice(0, 60000) + '\n...(truncated)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${body}\n\`\`\``
            });
