name: pr
on: 
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint backend with ruff
        run: pip install ruff && ruff check backend/

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: Lint frontend with eslint
        run: cd frontend && npm ci && npm run lint
  
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"  

      - name: Installing requirements
        run: pip install -r backend/requirements.txt
      
      - name: Run tests
        run: cd backend && pytest tests/ -v

  build: 
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v4

      - name: Build Docker backend
        run: docker build ./backend
      
      - name: Build Docker frontend
        run: docker build ./frontend
  
  trivy:
    runs-on: ubuntu-latest
    needs: [build]
    steps: 
      - uses: actions/checkout@v4
    
      - run: docker build -t rag-backend:pr ./backend

      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: rag-backend:pr
          severity: CRITICAL,HIGH