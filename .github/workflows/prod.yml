name: prod
on: 
  push:
    tags:
      - 'v*'

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - run: docker build -t ghcr.io/${{ github.repository }}/rag-backend:${{ github.sha }} ./backend && docker push ghcr.io/${{ github.repository }}/rag-backend:${{ github.sha }}

      - run: docker build -t ghcr.io/${{ github.repository }}/rag-frontend:${{ github.sha }} ./frontend && docker push ghcr.io/${{ github.repository }}/rag-frontend:${{ github.sha }}

      - uses: sigstore/cosign-installer@v3

      - run: cosign sign --yes ghcr.io/${{ github.repository }}/rag-backend:${{ github.sha }}
  
  deploy:
    runs-on: ubuntu-latest
    needs: [build-push]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: cd /app && echo "IMAGE_TAG=${{ github.sha }}" >> .env && docker compose pull backend frontend && docker compose up -d backend frontend

  smoke-test:
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - run: curl --fail https://${{ vars.DOMAIN_NAME }}/health
  
  rollback: 
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: failure()
    steps: 
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: cd /app && docker compose up -d backend frontend