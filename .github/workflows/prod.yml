name: Production deploy

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      backend-image: ${{ steps.meta-backend.outputs.tags }}
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        id: meta-backend
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/rag-backend:${{ github.sha }}"
          docker build -t "$IMAGE" ./backend
          docker push "$IMAGE"
          echo "tags=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend
        id: meta-frontend
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/rag-frontend:${{ github.sha }}"
          docker build -t "$IMAGE" ./frontend
          docker push "$IMAGE"
          echo "tags=$IMAGE" >> "$GITHUB_OUTPUT"

      - uses: sigstore/cosign-installer@v3

      - name: Sign images
        run: |
          cosign sign --yes "ghcr.io/${{ github.repository }}/rag-backend:${{ github.sha }}"
          cosign sign --yes "ghcr.io/${{ github.repository }}/rag-frontend:${{ github.sha }}"

  deploy:
    runs-on: ubuntu-latest
    needs: [build-push]
    environment: production
    steps:
      - uses: appleboy/ssh-action@v1
        env:
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: SHA,REPO,GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            BACKEND_IMAGE="ghcr.io/${REPO}/rag-backend:${SHA}"
            FRONTEND_IMAGE="ghcr.io/${REPO}/rag-frontend:${SHA}"

            # Save current images for rollback
            grep '^BACKEND_IMAGE=' /app/.env > /app/.prev_images 2>/dev/null || true
            grep '^FRONTEND_IMAGE=' /app/.env >> /app/.prev_images 2>/dev/null || true

            # Pull new images
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker pull "$BACKEND_IMAGE"
            docker pull "$FRONTEND_IMAGE"

            # Update image tags in .env
            git -C /app pull
            sed -i '/^BACKEND_IMAGE/d' /app/.env
            sed -i '/^FRONTEND_IMAGE/d' /app/.env
            echo "BACKEND_IMAGE=$BACKEND_IMAGE" >> /app/.env
            echo "FRONTEND_IMAGE=$FRONTEND_IMAGE" >> /app/.env

            BACKEND_IMAGE="$BACKEND_IMAGE" FRONTEND_IMAGE="$FRONTEND_IMAGE" \
              docker compose -f /app/docker-compose.yml --env-file /app/.env up -d --no-deps backend frontend

  smoke-test:
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Health check
        run: curl --fail --retry 5 --retry-delay 10 https://${{ vars.DOMAIN_NAME }}/health

  rollback:
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: failure()
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            if [ -f /app/.prev_images ]; then
              source /app/.prev_images
              sed -i '/^BACKEND_IMAGE/d' /app/.env
              sed -i '/^FRONTEND_IMAGE/d' /app/.env
              cat /app/.prev_images >> /app/.env
              BACKEND_IMAGE="$BACKEND_IMAGE" FRONTEND_IMAGE="$FRONTEND_IMAGE" \
                docker compose -f /app/docker-compose.yml --env-file /app/.env up -d --no-deps backend frontend
            fi
