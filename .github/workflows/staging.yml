name: Staging deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      backend-image: ${{ steps.meta-backend.outputs.tags }}
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image names (lowercase)
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_IMAGE=ghcr.io/${REPO}/rag-backend:${{ github.sha }}" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=ghcr.io/${REPO}/rag-frontend:${{ github.sha }}" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        run: |
          docker build -t "$BACKEND_IMAGE" ./backend
          docker push "$BACKEND_IMAGE"

      - name: Build and push frontend
        run: |
          docker build -t "$FRONTEND_IMAGE" ./frontend
          docker push "$FRONTEND_IMAGE"

      - uses: sigstore/cosign-installer@v3

      - name: Sign images
        run: |
          cosign sign --yes "$BACKEND_IMAGE"
          cosign sign --yes "$FRONTEND_IMAGE"

  deploy:
    runs-on: ubuntu-latest
    needs: [build-push]
    steps:
      - uses: appleboy/ssh-action@v1
        env:
          SHA: ${{ github.sha }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: SHA,GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            REPO_FULL=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            BACKEND_IMAGE="ghcr.io/${REPO_FULL}/rag-backend:${SHA}"
            FRONTEND_IMAGE="ghcr.io/${REPO_FULL}/rag-frontend:${SHA}"

            # Save current images for rollback
            cp /app/.image-tags /app/.prev_images 2>/dev/null || true

            # Pull new images
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker pull "$BACKEND_IMAGE"
            docker pull "$FRONTEND_IMAGE"

            # Update image tags tracker
            sudo git -C /app pull
            echo "BACKEND_IMAGE=$BACKEND_IMAGE" > /app/.image-tags
            echo "FRONTEND_IMAGE=$FRONTEND_IMAGE" >> /app/.image-tags

            BACKEND_IMAGE="$BACKEND_IMAGE" FRONTEND_IMAGE="$FRONTEND_IMAGE" \
              docker compose -f /app/docker-compose.yml --env-file /run/secrets/app.env up -d --no-deps backend frontend

  smoke-test:
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Health check
        run: curl --fail --retry 5 --retry-delay 10 https://${{ vars.DOMAIN_NAME }}/health

  rollback:
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: failure()
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          script: |
            set -e
            if [ -f /app/.prev_images ]; then
              source /app/.prev_images
              cp /app/.prev_images /app/.image-tags
              BACKEND_IMAGE="$BACKEND_IMAGE" FRONTEND_IMAGE="$FRONTEND_IMAGE" \
                docker compose -f /app/docker-compose.yml --env-file /run/secrets/app.env up -d --no-deps backend frontend
            fi
