model:
  name: Qwen/Qwen3.5-0.8B-Base

data:
  train_file: ./data/train.jsonl
  eval_file: ./data/held_out.jsonl
  # Each document is formatted as "title\n\ntext" by prepare_corpus.py.
  # Documents longer than max_seq_length are truncated.
  # Token budget: ~7 016 docs × ~1 024 tokens ≈ 7.2M tokens seen per epoch
  # (full corpus is 11.7M tokens; increase max_seq_length to 2048 to capture more)
  max_seq_length: 1024

training:
  seed: 42
  output_dir: ./checkpoints

  # ── Batch & steps ────────────────────────────────────────────────────────────
  # RTX 4090 (24 GB) in bf16 with gradient_checkpointing:
  #   per_device × grad_accum = effective_batch = 32 sequences = 32 768 tokens/step
  #   steps/epoch = ceil(7 016 / 32) ≈ 220 optimizer steps
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 4
  per_device_eval_batch_size: 8
  num_train_epochs: 1

  # ── Optimisation ─────────────────────────────────────────────────────────────
  # 1e-4 is standard for CPT (higher than SFT, lower than pretraining from scratch)
  learning_rate: 1.0e-4
  lr_scheduler_type: cosine
  warmup_steps: 30          # ~14% of total steps — short warmup for fine-grained CPT
  weight_decay: 0.01

  # ── Precision & memory ───────────────────────────────────────────────────────
  # bf16: same dynamic range as fp32, no GradScaler needed (unlike fp16)
  bf16: true
  gradient_checkpointing: true   # trades compute for memory (~30% slower, saves ~40% VRAM)

  # ── Logging & checkpointing ──────────────────────────────────────────────────
  logging_steps: 10
  eval_steps: 50
  save_steps: 100
  save_total_limit: 2            # keeps only the 2 best checkpoints

  # ── Loss curve export ────────────────────────────────────────────────────────
  loss_curve_png: ./loss_curve.png
