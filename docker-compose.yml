services:

  # ── Base de données PostgreSQL avec l'extension pgvector ──────────────────
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ragdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend FastAPI ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    environment:
      # "db" est le nom du service ci-dessus, résolu automatiquement dans le réseau Docker
      DATABASE_URL: postgresql+asyncpg://rag_user:${POSTGRES_PASSWORD}@db:5432/ragdb
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    volumes:
      # Les modèles HuggingFace (BGE-M3, reranker) sont mis en cache ici
      # pour ne pas être retéléchargés à chaque redémarrage
      - hf_cache:/app/.cache/huggingface
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  # ── Frontend React (nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
  hf_cache:
