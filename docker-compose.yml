services:

  # ── Base de données PostgreSQL avec l'extension pgvector ──────────────────
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ragdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend FastAPI ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    image: ${BACKEND_IMAGE:-rag-backend:local}
    environment:
      # "db" est le nom du service ci-dessus, résolu automatiquement dans le réseau Docker
      DATABASE_URL: postgresql+asyncpg://rag_user:${POSTGRES_PASSWORD}@db:5432/ragdb
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    volumes:
      # Les modèles HuggingFace (BGE-M3, reranker) sont mis en cache ici
      # pour ne pas être retéléchargés à chaque redémarrage
      - hf_cache:/app/.cache/huggingface
      - ./data:/data
      - ./scripts:/app/scripts
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  # ── Frontend React (nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    image: ${FRONTEND_IMAGE:-rag-frontend:local}
    depends_on:
      - backend
    ports:
      - "3000:80"

  # ── Grafana Alloy : scrape métriques + collecte logs → Grafana Cloud ────────
  alloy:
    image: grafana/alloy:latest
    volumes:
      - ./infra/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - GRAFANA_PROM_URL=${GRAFANA_PROM_URL}
      - GRAFANA_PROM_USER=${GRAFANA_PROM_USER}
      - GRAFANA_PROM_PASSWORD=${GRAFANA_PROM_PASSWORD}
      - GRAFANA_LOKI_URL=${GRAFANA_LOKI_URL}
      - GRAFANA_LOKI_USER=${GRAFANA_LOKI_USER}
      - GRAFANA_LOKI_PASSWORD=${GRAFANA_LOKI_PASSWORD}
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    depends_on:
      - backend

volumes:
  pgdata:
  hf_cache:
