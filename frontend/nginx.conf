server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing : toute URL inconnue renvoie index.html
    # (sinon un refresh sur une route React donne 404)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers le backend pour les appels API
    # "backend" est le nom du service dans docker-compose
    location /chat {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Critique pour le streaming SSE : désactiver le buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
