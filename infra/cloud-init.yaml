#cloud-config
package_update: true
package_upgrade: false

packages:
  - ca-certificates
  - curl
  - gnupg
  - git
  - apt-transport-https
  - debian-keyring
  - debian-archive-keyring

runcmd:
  # ── Docker ────────────────────────────────────────────────────────────────
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update -q
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - usermod -aG docker ubuntu

  # ── Caddy (reverse proxy + TLS Let's Encrypt automatique) ─────────────────
  - curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  - curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | tee /etc/apt/sources.list.d/caddy-stable.list
  - apt-get update -q && apt-get install -y caddy

  # ── Application ───────────────────────────────────────────────────────────
  - git clone https://github.com/Nyries/Racine_Ai_Test_Technique.git /app
  - chown -R ubuntu:ubuntu /app

  # ── Corpus : téléchargement depuis HuggingFace Datasets ───────────────────
  - mkdir -p /app/data/clean
  - pip3 install -q huggingface_hub
  - python3 -c "from huggingface_hub import snapshot_download; snapshot_download('Nyries/middle-east-geopolitics-corpus', repo_type='dataset', local_dir='/app/data/clean', ignore_patterns=['*.md', '.gitattributes', '*.json'])"
  - chown -R ubuntu:ubuntu /app/data

  # Secrets écrits dans /run/secrets/ (tmpfs — RAM uniquement, jamais sur disque)
  - mkdir -p /run/secrets
  - chown root:ubuntu /run/secrets
  - chmod 750 /run/secrets
  - |
    cat > /run/secrets/app.env << 'ENVEOF'
    POSTGRES_PASSWORD=${postgres_password}
    OPENROUTER_API_KEY=${openrouter_api_key}
    DATABASE_URL=postgresql+asyncpg://rag_user:${postgres_password}@db:5432/ragdb
    GRAFANA_PROM_URL=${grafana_prom_url}
    GRAFANA_PROM_USER=${grafana_prom_user}
    GRAFANA_PROM_PASSWORD=${grafana_prom_password}
    GRAFANA_LOKI_URL=${grafana_loki_url}
    GRAFANA_LOKI_USER=${grafana_loki_user}
    GRAFANA_LOKI_PASSWORD=${grafana_loki_password}
    ENVEOF
  - chown root:ubuntu /run/secrets/app.env
  - chmod 440 /run/secrets/app.env

  # Démarrage des containers avec les secrets
  - docker compose --env-file /run/secrets/app.env -f /app/docker-compose.yml up -d

  # ── Caddy : reverse proxy vers le frontend, TLS automatique ───────────────
  - |
    cat > /etc/caddy/Caddyfile << CADDYEOF
    ${domain_name} {
      handle /chat {
        reverse_proxy localhost:8000 {
          flush_interval -1
        }
      }
      handle /health {
        reverse_proxy localhost:8000
      }
      handle {
        reverse_proxy localhost:3000
      }
    }
    CADDYEOF

  - systemctl restart caddy
  - systemctl enable caddy
