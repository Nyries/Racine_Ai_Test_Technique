#cloud-config
package_update: true
package_upgrade: false

packages:
  - ca-certificates
  - curl
  - gnupg
  - git
  - apt-transport-https
  - debian-keyring
  - debian-archive-keyring
  - python3-pip

runcmd:
  # ── Docker ────────────────────────────────────────────────────────────────
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update -q
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - usermod -aG docker ubuntu

  # ── Caddy (reverse proxy + TLS Let's Encrypt automatique) ─────────────────
  - curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  - curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | tee /etc/apt/sources.list.d/caddy-stable.list
  - apt-get update -q && apt-get install -y caddy

  # ── OVH Python client (pour fetch les secrets depuis OKMS) ────────────────
  - pip3 install ovh --break-system-packages

  # ── Application ───────────────────────────────────────────────────────────
  - git clone https://github.com/Nyries/Racine_Ai_Test_Technique.git /app
  - chown -R ubuntu:ubuntu /app

  # Fetch secrets depuis OVH OKMS — aucun fichier .env écrit sur le disque
  - |
    python3 << 'PYEOF'
    import ovh
    import subprocess
    import os

    client = ovh.Client(
        endpoint='ovh-eu',
        application_key='${ovh_app_key}',
        application_secret='${ovh_app_secret}',
        consumer_key='${ovh_consumer_key}',
    )

    okms_id = '${okms_id}'

    def get_secret(secret_id):
        versions = client.get(f'/v2/okms/resource/{okms_id}/secret/{secret_id}/version')
        version_id = versions[0]['id']
        version = client.get(f'/v2/okms/resource/{okms_id}/secret/{secret_id}/version/{version_id}')
        return version['data']['value']

    postgres_password = get_secret('${postgres_secret_id}')
    openrouter_api_key = get_secret('${openrouter_secret_id}')

    env = os.environ.copy()
    env['POSTGRES_PASSWORD'] = postgres_password
    env['OPENROUTER_API_KEY'] = openrouter_api_key
    env['DATABASE_URL'] = f'postgresql+asyncpg://rag_user:{postgres_password}@db:5432/ragdb'

    subprocess.run(
        ['docker', 'compose', '-f', '/app/docker-compose.yml', 'up', '-d'],
        env=env,
        check=True
    )
    PYEOF

  # ── Caddy : reverse proxy vers le frontend, TLS automatique ───────────────
  - |
    cat > /etc/caddy/Caddyfile << CADDYEOF
    ${domain_name} {
      reverse_proxy localhost:3000
    }
    CADDYEOF

  - systemctl restart caddy
  - systemctl enable caddy
